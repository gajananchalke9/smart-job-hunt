gcp:
  project-id: YOUR_GCP_PROJECT_ID           # e.g. my-gcp-project-123
  location: us-central1                     # Vertex AI region (Gemini + embeddings)
  discovery-engine-location: global         # Vertex AI Search location (usually "global")
  gcs:
    bucket: hackathon-db-2026               # GCS bucket for job profiles and error logs
    error-log-prefix: log                   # Directory prefix for error logs (default: log)
  discovery-engine:
    datastore-id: YOUR_DATASTORE_ID         # e.g. job-profiles-datastore
  vertex-ai:
    gemini-model: gemini-1.5-flash          # or gemini-1.5-pro

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

# Logging configuration
logging:
  level:
    root: INFO
    com.smartjobhunt: DEBUG
    org.springframework.web: INFO
    com.google.cloud: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
